<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JoSAA Rank Predictor 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --josaa-blue: #003580;
      --josaa-blue-dark: #002560;
      --josaa-gold: #FFD700;
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #dde1e7;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --green: #1a8a4a;
      --green-bg: #e6f4ea;
      --amber: #b45309;
      --amber-bg: #fef3c7;
      --red: #c0392b;
      --red-bg: #fdecea;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: var(--josaa-blue);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 26px; font-weight: 700; color: var(--josaa-gold); letter-spacing: -1px; }
    .header-title { color: white; }
    .header-title .main { font-size: 14px; font-weight: 600; }
    .header-title .sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .header-badge {
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* ── Layout ── */
    .main-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .card-header {
      background: var(--josaa-blue);
      color: white;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body { padding: 16px; }

    /* ── Form elements ── */
    .form-group { margin-bottom: 13px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    input[type=number], select, input[type=text] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.15s;
    }
    input[type=number]:focus, select:focus, input[type=text]:focus {
      outline: none;
      border-color: var(--josaa-blue);
      background: white;
    }
    .input-hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── Predict button ── */
    .btn-predict {
      width: 100%;
      padding: 11px;
      background: var(--josaa-blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-predict:hover { background: var(--josaa-blue-dark); }
    .btn-predict:active { transform: scale(0.98); }
    .btn-predict:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

    /* ── Right panel states ── */
    .panel-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-muted);
      font-size: 14px;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .placeholder-icon { font-size: 48px; opacity: 0.3; }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--josaa-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }

    /* ── Results panel ── */
    .results-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-info { font-size: 13px; color: var(--text-muted); }
    .results-info strong { color: var(--text); }
    .rank-pill {
      background: #e8f0fe;
      color: var(--josaa-blue);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── Filter tabs ── */
    .filter-bar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: #fafbfc;
    }
    .ftab {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: white;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .ftab:hover { border-color: var(--josaa-blue); color: var(--josaa-blue); }
    .ftab.active { background: var(--josaa-blue); color: white; border-color: var(--josaa-blue); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
    thead tr { background: #f1f5f9; }
    thead th {
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid #f1f3f5;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 10px 12px; vertical-align: middle; }

    .inst-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .badge-iit { background: #e8f0fe; color: #1a56c4; }
    .badge-nit { background: #e6f4ea; color: #1a7a3a; }
    .badge-iiit { background: #fce8e6; color: #b91c1c; }
    .badge-gfti { background: #f3f4f6; color: #4b5563; }
    .inst-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .prog-name { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

    .closing-rank { font-size: 13px; font-weight: 600; color: var(--text); }
    .rank-diff { font-size: 10px; margin-top: 2px; }
    .rank-better { color: var(--green); }
    .rank-worse  { color: var(--red); }

    /* ── Probability bar ── */
    .prob-cell { min-width: 130px; }
    .prob-row { display: flex; align-items: center; gap: 8px; }
    .prob-track {
      flex: 1;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    .prob-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .fill-high  { background: var(--green); }
    .fill-mid   { background: #f59e0b; }
    .fill-low   { background: var(--red); }
    .prob-pct {
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }
    .pct-high { color: var(--green); }
    .pct-mid  { color: var(--amber); }
    .pct-low  { color: var(--red); }

    /* ── Notice bar ── */
    .notice {
      font-size: 11px;
      color: var(--text-muted);
      padding: 8px 16px;
      background: #fafbfc;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Error state ── */
    .error-state {
      padding: 24px;
      text-align: center;
      color: var(--red);
      font-size: 13px;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .main-layout { grid-template-columns: 1fr; }
      .header-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-left">
    <div class="logo">JoSAA</div>
    <div class="header-title">
      <div class="main">Joint Seat Allocation Authority — Rank Predictor</div>
      <div class="sub">IITs · NITs · IIITs · GFTIs · Academic Year 2026–27</div>
    </div>
  </div>
  
</header>

<div class="main-layout">

  <!-- ── Left: Filter panel ── -->
  <div>
    <div class="card">
      <div class="card-header"> Student Profile</div>
      <div class="card-body">
        <div class="form-group">
          <label>JEE Mains Rank (CRL)</label>
          <input type="number" id="mains-rank" placeholder="e.g. 50000" min="1" />
          <div class="input-hint">Used for NITs, IIITs, GFTIs</div>
        </div>
        <div class="form-group">
          <label>JEE Advanced Rank</label>
          <input type="number" id="adv-rank" placeholder="Leave blank if not applicable" min="1" />
          <div class="input-hint">Used for IITs (AI quota)</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="card-header">Seat Filters</div>
      <div class="card-body">
        <div class="form-group">
          <label>Category (Seat Type) *</label>
          <select id="category">
            <option value="">-- Required --</option>
            <option value="OPEN">OPEN</option>
            <option value="OBC-NCL">OBC-NCL</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="EWS">EWS</option>
            <option value="OPEN (PwD)">OPEN (PwD)</option>
            <option value="OBC-NCL (PwD)">OBC-NCL (PwD)</option>
            <option value="SC (PwD)">SC (PwD)</option>
            <option value="ST (PwD)">ST (PwD)</option>
            <option value="EWS (PwD)">EWS (PwD)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Gender *</label>
          <select id="gender">
            <option value="">-- Required --</option>
            <option value="Gender-Neutral">Gender-Neutral</option>
            <option value="Female-only (including Supernumerary)">Female-only (incl. Supernumerary)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quota *</label>
          <select id="quota">
            <option value="">-- Required --</option>
            <option value="AI">AI — All India (IITs)</option>
            <option value="OS">OS — Other State (NITs)</option>
            <option value="HS">HS — Home State (NITs)</option>
            <option value="GO">GO — Goa State</option>
            <option value="JK">JK — J&amp;K State</option>
            <option value="LA">LA — Ladakh</option>
          </select>
        </div>
        <div class="divider"></div>
        <div class="form-group">
          <label>Institute Type</label>
          <select id="inst-type">
            <option value="ALL">All Institutes</option>
            <option value="IIT">IITs only</option>
            <option value="NIT">NITs only</option>
            <option value="IIIT">IIITs only</option>
            <option value="GFTI">GFTIs only</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch / Program (optional)</label>
          <input type="text" id="branch-filter" placeholder="e.g. Computer Science" />
        </div>
        <div class="form-group">
          <label>Results to show</label>
          <select id="top-n">
            <option value="20">Top 20</option>
            <option value="50" selected>Top 50</option>
            <option value="100">Top 100</option>
            <option value="ALL">All matching seats</option>
          </select>
        </div>
        <button class="btn-predict" id="predict-btn" onclick="runPrediction()">
          Predict Seat Allotment
        </button>
      </div>
    </div>
  </div>

  <!-- ── Right: Results panel ── -->
  <div id="right-panel">
    <div class="panel-placeholder" id="placeholder">
      <div class="placeholder-icon">&#127979;</div>
      <div>Enter your rank and filters, then click Predict</div>
    </div>
  </div>

</div>

<script>
  const API = 'http://127.0.0.1:5000';

  function showLoading() {
    document.getElementById('right-panel').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Running model across all seats…</div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('right-panel').innerHTML = `
      <div class="card">
        <div class="error-state">&#9888;&#65039; ${msg}</div>
      </div>`;
  }

  let allResults = [];

  function getInstType(name) {
    const n = (name || '').toLowerCase();
    if (n.includes('indian institute of technology')) return 'IIT';
    if (n.includes('national institute of technology')) return 'NIT';
    if (n.includes('indian institute of information technology') || n.includes('iiit')) return 'IIIT';
    return 'GFTI';
  }

  function badgeClass(t) {
    return { IIT:'badge-iit', NIT:'badge-nit', IIIT:'badge-iiit', GFTI:'badge-gfti' }[t] || 'badge-gfti';
  }

  function renderResults(data, rankUsed, filterLevel) {
    if (!data.length) {
      document.getElementById('right-panel').innerHTML = `
        <div class="card">
          <div class="error-state" style="color:var(--text-muted)">
            &#128269; No seats found matching your filters.<br>
            <small style="margin-top:6px;display:block">Try changing institute type, quota, or category.</small>
          </div>
        </div>`;
      return;
    }

    const counts = {
      ALL: allResults.length,
      HIGH: allResults.filter(r => r.prob >= 70).length,
      MID:  allResults.filter(r => r.prob >= 30 && r.prob < 70).length,
      LOW:  allResults.filter(r => r.prob < 30).length
    };

    const rows = data.map((r, i) => {
      const p = r.prob;
      const fillCls = p >= 70 ? 'fill-high' : p >= 30 ? 'fill-mid' : 'fill-low';
      const pctCls  = p >= 70 ? 'pct-high'  : p >= 30 ? 'pct-mid'  : 'pct-low';
      const instType = r.inst_type || getInstType(r.institute);
      const diff = r.predicted_closing - rankUsed;
      const diffHtml = diff > 0
        ? `<div class="rank-diff rank-better">&#9650; ${diff.toLocaleString('en-IN')} better than cutoff</div>`
        : `<div class="rank-diff rank-worse">&#9660; ${Math.abs(diff).toLocaleString('en-IN')} worse than cutoff</div>`;

      return `<tr>
        <td style="color:#9ca3af;font-size:11px;text-align:center;">${i+1}</td>
        <td>
          <div class="inst-badge ${badgeClass(instType)}">${instType}</div>
          <div class="inst-name">${r.institute}</div>
        </td>
        <td><div class="prog-name">${r.program}</div></td>
        <td style="font-size:12px;color:var(--text-muted);">${r.quota}</td>
        <td>
          <div class="closing-rank">${r.predicted_closing.toLocaleString('en-IN')}</div>
          ${diffHtml}
        </td>
        <td class="prob-cell">
          <div class="prob-row">
            <div class="prob-track">
              <div class="prob-fill ${fillCls}" style="width:${Math.round(p)}%"></div>
            </div>
            <span class="prob-pct ${pctCls}">${p.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    const tabActive = (lvl) => filterLevel === lvl ? 'active' : '';

    document.getElementById('right-panel').innerHTML = `
      <div class="card">
        <div class="results-meta">
          <div class="results-info">
            Showing <strong>${data.length}</strong> seats &nbsp;|&nbsp;
            Rank used: <strong>${rankUsed.toLocaleString('en-IN')}</strong>
          </div>
          <div class="rank-pill">2026 Prediction</div>
        </div>

        <div class="filter-bar">
          <div class="ftab ${tabActive('ALL')}"  onclick="applyFilter('ALL',  this)">All (${counts.ALL})</div>
          <div class="ftab ${tabActive('HIGH')}" onclick="applyFilter('HIGH', this)"> High chance &gt;70% (${counts.HIGH})</div>
          <div class="ftab ${tabActive('MID')}"  onclick="applyFilter('MID',  this)"> Moderate 30–70% (${counts.MID})</div>
          <div class="ftab ${tabActive('LOW')}"  onclick="applyFilter('LOW',  this)"> Reach &lt;30% (${counts.LOW})</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:36px;">#</th>
                <th>Institute</th>
                <th>Academic Program</th>
                <th>Quota</th>
                <th>Predicted Closing Rank 2026</th>
                <th>Probability</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>

        <div class="notice">
           Predictions on JOSAA historical data till 2025.
          Results are probabilistic estimates, not guarantees.
        </div>
      </div>`;
  }

  function applyFilter(level, el) {
    const rankUsed = parseInt(document.getElementById('right-panel').querySelector('.rank-pill') ? 0 : 0);
    let filtered = allResults;
    if (level === 'HIGH') filtered = allResults.filter(r => r.prob >= 70);
    else if (level === 'MID') filtered = allResults.filter(r => r.prob >= 30 && r.prob < 70);
    else if (level === 'LOW') filtered = allResults.filter(r => r.prob < 30);
    const quota = document.getElementById('quota').value;
    const rank = quota === 'AI'
      ? parseInt(document.getElementById('adv-rank').value || document.getElementById('mains-rank').value)
      : parseInt(document.getElementById('mains-rank').value);
    renderResults(filtered, rank, level);
  }

  async function runPrediction() {
    const mainsRank = document.getElementById('mains-rank').value;
    const advRank   = document.getElementById('adv-rank').value;
    const category  = document.getElementById('category').value;
    const gender    = document.getElementById('gender').value;
    const quota     = document.getElementById('quota').value;

    if (!mainsRank && !advRank) { alert('Please enter at least one rank.'); return; }
    if (!category) { alert('Please select a category.'); return; }
    if (!gender)   { alert('Please select gender.'); return; }
    if (!quota)    { alert('Please select a quota.'); return; }

    const btn = document.getElementById('predict-btn');
    btn.disabled = true;
    btn.textContent = 'Running model…';
    showLoading();

    try {
      const res = await fetch(`${API}/api/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mains_rank: mainsRank ? parseInt(mainsRank) : null,
          adv_rank:   advRank   ? parseInt(advRank)   : null,
          category,
          gender,
          quota,
          inst_type:     document.getElementById('inst-type').value,
          branch_filter: document.getElementById('branch-filter').value.trim(),
          top_n:         document.getElementById('top-n').value
        })
      });

      const data = await res.json();

      if (data.error) {
        showError(data.error);
      } else {
        allResults = data.results;
        renderResults(allResults, data.rank_used, 'ALL');
      }
    } catch(e) {
      showError('Could not connect to the backend. Make sure Flask is running on port 5000.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Predict Seat Allotment';
    }
  }
</script>
</body>
</html>
